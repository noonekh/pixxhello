<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Register | NetPro Services</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* បន្ថែម Style បន្តិចបន្តួចសម្រាប់ទំព័រ Auth នេះ */
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* កន្លែងប្តូររូបភាព Background */
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), 
                        url('file:///E:/Website/backgroundFormLogin.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            padding: 20px;
        }
        }
        .auth-box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 800px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }
        .auth-divider {
            border-left: 1px solid #ddd;
        }
        @media (max-width: 600px) {
            .auth-box { grid-template-columns: 1fr; }
            .auth-divider { border-left: none; border-top: 1px solid #ddd; padding-top: 20px; }
        }
        .back-home {
            position: absolute;
            top: 20px;
            left: 20px;
            text-decoration: none;
            color: #001f3f;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-home">← Back to Home</a>

    <div class="auth-container">
        <div class="auth-box">
            <div class="login-part">
                <h2>Login</h2>
                <p>Access your dashboard</p>
                <form>
                    <input type="text" placeholder="Username or Email" required>
                    <input type="password" placeholder="Password" required>
                    <button type="submit" class="btn-submit">Login</button>
                    <p style="margin-top:10px; font-size: 0.9rem;"><a href="#">Forgot password?</a></p>
                </form>
            </div>

            <div class="register-part auth-divider">
                <h2 style="padding-left: 20px;">Register</h2>
                <p style="padding-left: 20px;">Join NetPro family</p>
                <form style="padding-left: 20px;">
                    <input type="text" placeholder="Full Name" required>
                    <input type="email" placeholder="Email Address" required>
                    <input type="password" placeholder="Create Password" required>
                    <input type="password" placeholder="Confirm Password" required>
                    <button type="submit" class="btn-submit" style="background: #00d4ff;">Create Account</button>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
